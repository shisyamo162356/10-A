<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>先生ティア表</title>

<style>
body {
    background-color: #eeeeee;
    font-family: sans-serif;
}

.page {
    width: 850px;
    margin: 30px auto;
    background-color: white;
    padding: 20px;
}

.header {
    display: block;
    background-color: #444444;
    color: white;
    text-align: center;
    padding: 20px;
}

.text {
    display: block;
    background-color: #f7f7f7;
    padding: 15px;
    margin-top: 15px;
}

.card {
    display: inline-block;
    width: 240px;
    height: 260px;
    background-color: #fafafa;
    margin: 15px;
    padding: 15px;
    vertical-align: top;
    border: 2px solid #cccccc;
}

.tier {
    display: block;
    background-color: #ffcc66;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    padding: 10px;
}

.teacher {
    font-size: 24px;
    font-weight: bold;
}

.small {
    color: #555555;
}

.point {
    background-color: #eeeeee;
    padding: 8px;
    margin-top: 10px;
}

.footer {
    display: block;
    background-color: #444444;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>
</head>

<body>

<div class="page">

    <div class="header">
        課題を出してくる先生ティア表
    </div>

    <div class="text">
        課題の量、提出期限、説明の分かりやすさをもとにしたティア表です。
    </div>

    <div class="card">
        <div class="tier">A</div>
        <p class="teacher">K崎先生</p>
        <p class="small">課題量：多め</p>
        <p class="small">期限：普通</p>
        <div class="point">
            量は他の先生よりかなり多いが、説明が分かりやすく、無理なく進められる。
        </div>
    </div>

    <div class="card">
        <div class="tier">B</div>
        <p class="teacher">K野先生</p>
        <p class="small">課題量：少なめ</p>
        <p class="small">期限：長め</p>
        <div class="point">
            内容は普通だが提出方法がややこしく、初見殺しのような条件に見事引っ掛かかった
        </div>
    </div>

    <div class="card">
        <div class="tier">S</div>
        <p class="teacher">O田先生</p>
        <p class="small">課題量：少なめ</p>
        <p class="small">期限：余裕あり</p>
        <div class="point">
            課題を期限までに提出する大切さを毎度説明し、期限が近くなるとリマインドしてくれる
        </div>
    </div>

    <div class="footer">
        ※個人の感想です。またこれは課題で作った架空の教師であるため実際の人物や団体とは一切関係ありません
    </div>

</div>

</body>
</html>
