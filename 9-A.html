<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Amazonレイアウト</title>

<style>
body{
    margin:0;
    background:#e3e6e6;
    font-family:sans-serif;
}

.container{
    display:grid;
    grid-template-areas:
        "header header"
        "nav nav"
        "sidebar main"
        "footer footer";
    grid-template-columns:220px 1fr;
    grid-template-rows:70px 40px 1fr 80px;
    min-height:100vh;
}

header{
    grid-area:header;
    background:#131921;
    color:white;
    display:flex;
    align-items:center;
    gap:20px;
    padding:0 20px;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

.search{
    flex:1;
    padding:10px;
}

nav{
    grid-area:nav;
    background:#232f3e;
    color:white;
    display:flex;
    align-items:center;
    gap:20px;
    padding:0 20px;
}

.sidebar{
    grid-area:sidebar;
    background:white;
    padding:20px;
}

main{
    grid-area:main;
    padding:20px;
}

.hero{
    background:#ffd814;
    padding:30px;
    margin-bottom:20px;
    text-align:center;
    font-size:24px;
}

.products{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    height:140px;
}

footer{
    grid-area:footer;
    background:#131921;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
}
</style>
</head>

<body>
<div class="container">

    <header>
        <div class="logo">amazon</div>
        <input class="search" type="text" placeholder="Amazon.co.jpを検索">
        <div>アカウント</div>
        <div>カート</div>
    </header>

    <nav>
        <div>すべて</div>
        <div>タイムセール</div>
        <div>ギフトカード</div>
        <div>ランキング</div>
        <div>ヘルプ</div>
    </nav>

    <aside class="sidebar">
        <h3>カテゴリ</h3>
        <p>本</p>
        <p>家電</p>
        <p>ファッション</p>
        <p>食品</p>
    </aside>

    <main>
        <div class="hero">おすすめ商品・セール情報</div>

        <div class="products">
            <div class="card">商品エリア1</div>
            <div class="card">商品エリア2</div>
            <div class="card">商品エリア3</div>
            <div class="card">商品エリア4</div>
            <div class="card">商品エリア5</div>
            <div class="card">商品エリア6</div>
        </div>
    </main>

    <footer>
        フッター情報
    </footer>

</div>
</body>
</html>
