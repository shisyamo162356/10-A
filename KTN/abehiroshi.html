<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>KTNホームページ</title>

<style>
body{
    margin:0;
    background:#eeeeee;
    font-family:sans-serif;
}

.container{
    width:900px;
    margin:20px auto;
    background:white;
    border:1px solid #999;

    display:grid;
    grid-template-rows:80px 1fr;
    grid-template-columns:180px 1fr;
}

header{
    grid-row:1 / 2;
    grid-column:1 / 3;

    background:#d9ecff;
    border-bottom:1px solid #999;

    display:flex;
    justify-content:center;
    align-items:center;
}

nav{
    grid-row:2 / 3;
    grid-column:1 / 2;

    background:#f5f5f5;
    padding:15px;

    display:flex;
    flex-direction:column;
    gap:10px;
}

nav a{
    color:blue;
    text-decoration:underline;
}

main{
    grid-row:2 / 3;
    grid-column:2 / 3;

    padding:20px;

    display:grid;
    grid-template-columns:220px 1fr;
    gap:20px;
}

.photo img{
    width:200px;
    border:1px solid #666;
}

.info h2{
    margin-top:0;
}

.news{
    margin-top:20px;
    border-top:1px solid #999;
    padding-top:10px;
}
</style>

</head>
<body>

<div class="container">

    <header>
        <h1>プロフィール</h1>
    </header>

    <nav>
        <a href="#">課題</a>
        <a href="#">めんどくさくて</a>
        <a href="#">画面全体を</a>
        <a href="#">キャプチャした人は</a>
        <a href="#">減点です</a>
    </nav>

    <main>

        <section class="photo">
            <img src="">
        </section>

        <section class="info">

            <h2>KTN</h2>

            <p>生年月日：****年*月*日</p>
            <p>出身地：*****</p>
            <p>身長：165m</p>

            <div class="news">
                <h3>最新情報</h3>
            </div>

        </section>

    </main>

</div>

</body>
</html>
